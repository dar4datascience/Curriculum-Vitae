on:
  workflow_dispatch:
  push:
    branches: [main]

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglpk-dev libgmp3-dev libxml2-dev

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX
        run: quarto install tinytex

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.6'

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Render CV PDF with targets
        run: Rscript -e "targets::tar_make()"

      - name: Verify PDF created
        run: ls -lh danielamievarodriguez_cv.pdf

      - name: Render Quarto site
        run: quarto render

      - name: Copy PDF to docs
        run: cp danielamievarodriguez_cv.pdf docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
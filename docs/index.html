<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Daniel Amieva Rodriguez - Portfolio</title>
    <meta http-equiv="refresh" content="0; url=portfolio_animations_complete.html">
    <link rel="canonical" href="portfolio_animations_complete.html">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Loading Portfolio...</p>
        <p><a href="portfolio_animations_complete.html" style="color: white;">Click here if not redirected</a></p>
    </div>
</body>
</html>
